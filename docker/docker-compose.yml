version: '3.8'

services:
  # ======================
  # PostgreSQL + pgvector
  # ======================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: soluciones_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-soluciones_tms}
      POSTGRES_USER: ${POSTGRES_USER:-soluciones_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-demo_password_2026}
    ports:
      - "5433:5432" # Changed to 5433 to avoid conflict with gestion-rb
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-soluciones_user} -d ${POSTGRES_DB:-soluciones_tms}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ======================
  # Redis
  # ======================
  redis:
    image: redis:7-alpine
    container_name: soluciones_redis
    restart: unless-stopped
    ports:
      - "6380:6379" # Changed to 6380
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ======================
  # Backend (FastAPI)
  # ======================
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: soluciones_backend
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
    ports:
      - "8001:8000" # Changed to 8001
    volumes:
      - ../backend/src:/app/src
      - ../backend/scripts:/app/scripts
      - ../backend/uploads:/app/uploads
      - ../backend/alembic:/app/alembic
      - ../backend/alembic.ini:/app/alembic.ini
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

  # ======================
  # Frontend (Next.js)
  # ======================
  frontend:
    image: node:20-alpine
    container_name: soluciones_frontend
    working_dir: /app
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8001/api/v1
    ports:
      - "3001:3000" # Changed to 3001
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev"

volumes:
  postgres_data:
  redis_data:
  frontend_node_modules:
  frontend_next:
